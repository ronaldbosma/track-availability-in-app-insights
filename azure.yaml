# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: track-availability-in-app-insights
metadata:
  template: tdd-track-availability-in-app-insights@1.4.2
services:
  functionApp:
    project: ./src/functionApp/TrackAvailabilityInAppInsights.FunctionApp
    host: function
    language: csharp
  logicApp:
    project: ./src/logicApp
    dist: Workflows
    host: function
    language: js # Logic Apps aren't natively supported by azd yet. By using js, the logic app will be zipped and deployed.
    hooks:
      prepackage:
        shell: pwsh
        run: ../../hooks/prepackage-logicapp-build-functions-project.ps1
        interactive: true
requiredVersions:
  azd: ">= 1.23.15" # azd version 1.23.15 or higher is required because we're using features from Bicep 0.42.1.
